kind = "web"
previewPath = "/"
title = "Nectar — Premium Sparkling Water"
version = "1.0.0"
id = "artifacts/nectar"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21317

[services.development]
run = "pnpm --filter @workspace/nectar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nectar", "run", "build" ]
serve = "static"
publicDir = "artifacts/nectar/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21317"
BASE_PATH = "/"
